name: Update ClashX Pro Cask

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get latest version
        id: latest
        run: |
          VERSION=$(gh release view --repo ClashX-Pro/ClashX --json tagName -q .tagName)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check current version
        id: current
        run: |
          CURRENT=$(ruby -ne 'puts $1 if /version "([^"]+)"/' Casks/clashx-pro.rb)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Stop if already current
        if: steps.latest.outputs.version == steps.current.outputs.version
        run: echo "Already current."

      - name: Update cask
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          VERSION="${{ steps.latest.outputs.version }}"
          URL="https://github.com/ClashX-Pro/ClashX/releases/download/${VERSION}/ClashX.dmg"

          curl -L -o /tmp/ClashX.dmg "$URL"
          SHA256=$(shasum -a 256 /tmp/ClashX.dmg | awk '{print $1}')

          ruby -pi -e "gsub(/version \"[^\"]+\"/, \"version \\\"${VERSION}\\\"\"); gsub(/sha256 \"[a-f0-9]+\"/, \"sha256 \\\"${SHA256}\\\"\")" Casks/clashx-pro.rb

      - name: Commit update
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/clashx-pro.rb
          git commit -m "Update clashx-pro to ${{ steps.latest.outputs.version }}"
          git push
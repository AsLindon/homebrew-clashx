name: Update Brew Browser Native

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          CASK="Casks/brew-browser-native.rb"
          REPO="msitarzewski/brew-browser"

          json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "User-Agent: homebrew-casks-updater" \
            "https://api.github.com/repos/${REPO}/releases/latest")"

          echo "$json" | jq -e '.tag_name and .assets' >/dev/null

          release_version="$(echo "$json" | jq -r '.tag_name | ltrimstr("v")')"

          native_version="$(
            echo "$json" |
            jq -r '.assets[].name' |
            sed -nE 's/^BrewBrowser-([0-9.]+)-arm64\.dmg$/\1/p' |
            head -n1
          )"

          if [[ -z "$release_version" || -z "$native_version" ]]; then
            echo "Unable to determine versions."
            exit 1
          fi

          arm_url="https://github.com/${REPO}/releases/download/v${release_version}/BrewBrowser-${native_version}-arm64.dmg"
          intel_url="https://github.com/${REPO}/releases/download/v${release_version}/BrewBrowser-${native_version}-x86_64.dmg"

          curl -fsSL -o /tmp/brewbrowser-arm64.dmg "$arm_url"
          curl -fsSL -o /tmp/brewbrowser-x86_64.dmg "$intel_url"

          arm_sha="$(shasum -a 256 /tmp/brewbrowser-arm64.dmg | awk '{print $1}')"
          intel_sha="$(shasum -a 256 /tmp/brewbrowser-x86_64.dmg | awk '{print $1}')"

          ruby <<RUBY
          path = "$CASK"

          release = "$release_version"
          native = "$native_version"

          arm = "$arm_sha"
          intel = "$intel_sha"

          text = File.read(path)

          text.sub!(
            /version\s+"[^"]+"/,
            %(version "#{release},#{native}")
          )

          unless text.sub!(
            /sha256\s+arm:\s*(?:"[^"]+"|:no_check),\s*\n\s*intel:\s*(?:"[^"]+"|:no_check)/,
            %(sha256 arm:   "#{arm}",\n       intel: "#{intel}")
          )
            abort "Unable to update sha256 block."
          end

          File.write(path, text)
          RUBY

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update brew-browser-native
          title: Update brew-browser-native
          body: |
            Automated update for Brew Browser Native.
          branch: update-brew-browser-native
          delete-branch: true
